<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampGo Admin</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; color: #333; }
    .card { text-align: center; padding: 48px; background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { color: #FF6B35; margin: 0 0 8px; }
    p { color: #666; margin: 0 0 24px; }
    .btn { display: inline-block; padding: 10px 24px; background: #FF6B35; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; }
    .btn:hover { background: #e55a2b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>CampGo Admin</h1>
    <p>Admin dashboard SPA — deployed separately via the web app at /admin/*</p>
    <a class="btn" href="/admin/dashboard">Go to Dashboard</a>
  </div>
</body>
</html>
